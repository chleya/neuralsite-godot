<!DOCTYPE html>
<html>
<head>
    <title>NeuralSite 验证</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; padding: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .progress-bar { background: #eee; height: 20px; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #4CAF50; transition: width 0.3s; }
        h1 { color: #333; }
        .phase-planning { color: #2196F3; }
        .phase-clearing { color: #FF9800; }
        .phase-earthwork { color: #795548; }
        .phase-pavement { color: #9E9E9E; }
        .phase-completed { color: #4CAF50; }
    </style>
</head>
<body>
    <h1>🚧 NeuralSite 快速验证</h1>
    
    <div class="card">
        <h3>📊 统计</h3>
        <p>实体总数: <span id="total">22</span></p>
        <p>平均进度: <span id="avg-progress">47%</span></p>
        <p>施工中: <span id="in-progress">15</span></p>
    </div>
    
    <div class="card">
        <h3>📋 实体列表</h3>
        <div id="entities"></div>
    </div>
    
    <script>
        // 模拟数据
        const entities = [
            {name: "K1+000 路段", type: "road", phase: "earthwork", progress: 0.45},
            {name: "K2+000 路段", type: "road", phase: "pavement", progress: 0.75},
            {name: "K3+000 路段", type: "road", phase: "completed", progress: 1.0},
            {name: "1号桥", type: "bridge", phase: "structure", progress: 0.6},
            {name: "桩基 1", type: "pile", phase: "completed", progress: 1.0},
            {name: "桩基 2", type: "pile", phase: "structure", progress: 0.8},
            {name: "墩柱 1", type: "pier", phase: "planning", progress: 0.1},
            {name: "墩柱 2", type: "pier", phase: "earthwork", progress: 0.35}
        ];
        
        function render() {
            const div = document.getElementById('entities');
            div.innerHTML = '';
            
            entities.forEach((e, i) => {
                const phaseClass = 'phase-' + e.phase;
                div.innerHTML += `
                    <div class="card">
                        <h4>${e.name} (${e.type})</h4>
                        <p class="${phaseClass}">阶段: ${e.phase}</p>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${e.progress * 100}%"></div>
                        </div>
                        <p>进度: ${Math.round(e.progress * 100)}%</p>
                        <input type="range" min="0" max="100" value="${e.progress * 100}" 
                            onchange="updateProgress(${i}, this.value / 100)">
                    </div>
                `;
            });
        }
        
        function updateProgress(i, value) {
            entities[i].progress = value;
            if (value >= 1) entities[i].phase = 'completed';
            else if (value >= 0.9) entities[i].phase = 'finishing';
            else if (value >= 0.7) entities[i].phase = 'pavement';
            else if (value >= 0.3) entities[i].phase = 'earthwork';
            else if (value >= 0.1) entities[i].phase = 'clearing';
            else entities[i].phase = 'planning';
            render();
            console.log('更新:', entities[i]);
        }
        
        render();
    </script>
</body>
</html>
